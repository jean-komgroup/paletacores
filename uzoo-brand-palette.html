<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Colors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: #ffffff;
    padding: 16px;
    min-height: 100vh;
  }

  .header {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #999;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .colors {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ebebeb;
    background: #fff;
    transition: background 0.15s;
  }

  .row:hover { background: #f7f7f5; }

  .swatch {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .swatch.white { border: 1px solid #e0e0e0; }

  .info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .name {
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
  }

  .pantone {
    font-size: 11px;
    color: #aaa;
  }

  .chips {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #e0e0e0;
    color: #555;
    background: #f5f5f3;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  .chip:hover {
    background: #eee;
    border-color: #ccc;
    color: #111;
  }

  .chip.copied {
    background: #1D9E75;
    color: #fff;
    border-color: #1D9E75;
  }

  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #254858;
    color: #fff;
    font-size: 12px;
    padding: 7px 18px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.2s;
    z-index: 99;
    font-family: 'DM Mono', monospace;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header">Brand Colors</div>
<div class="colors" id="colors"></div>
<div class="toast" id="toast"></div>

<script>
const colors = [
  {
    name: "Branco",
    pantone: "—",
    hex: "#FFFFFF",
    rgb: "255, 255, 255",
    swatchStyle: "background:#FFFFFF;",
    swatchClass: "white"
  },
  {
    name: "Verde água",
    pantone: "PANTONE 7472 C",
    hex: "#4DBB8D",
    rgb: "77, 187, 141",
    swatchStyle: "background:#4DBB8D; filter: hue-rotate(20deg) saturate(1.25);",
    swatchClass: ""
  },
  {
    name: "Azul petróleo",
    pantone: "PANTONE 7477 C",
    hex: "#254858",
    rgb: "37, 72, 88",
    swatchStyle: "background:#254858;",
    swatchClass: ""
  },
  {
    name: "Amarelo vibrante",
    pantone: "PANTONE Yellow 012 C",
    hex: "#FFC800",
    rgb: "255, 200, 0",
    swatchStyle: "background:#FFC800;",
    swatchClass: ""
  },
  {
    name: "Laranja coral",
    pantone: "PANTONE 164 C",
    hex: "#FB854E",
    rgb: "251, 133, 78",
    swatchStyle: "background:#FB854E;",
    swatchClass: ""
  }
];

const container = document.getElementById('colors');
let toastTimer;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

function copy(text, chipEl) {
  navigator.clipboard.writeText(text).then(() => {
    document.querySelectorAll('.chip.copied').forEach(c => c.classList.remove('copied'));
    chipEl.classList.add('copied');
    setTimeout(() => chipEl.classList.remove('copied'), 1400);
    showToast(text);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    chipEl.classList.add('copied');
    setTimeout(() => chipEl.classList.remove('copied'), 1400);
    showToast(text);
  });
}

colors.forEach(c => {
  const row = document.createElement('div');
  row.className = 'row';

  row.innerHTML = `
    <div class="swatch ${c.swatchClass}" style="${c.swatchStyle}"></div>
    <div class="info">
      <span class="name">${c.name}</span>
      <span class="pantone">${c.pantone}</span>
    </div>
    <div class="chips">
      <span class="chip" data-val="${c.hex}">${c.hex}</span>
      <span class="chip" data-val="rgb(${c.rgb})">RGB</span>
    </div>
  `;

  row.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', e => {
      e.stopPropagation();
      copy(chip.dataset.val, chip);
    });
  });

  container.appendChild(row);
});
</script>
</body>
</html>
